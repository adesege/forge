
name: Publish Debian Package

on:
  push:
    tags: ["v*"]

env:
  FORGEJO_HOST: git.app.home.southroute.com
  PACKAGE_OWNER: bayne

jobs:
  publish-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Python package
        run: uv build

      - name: Build Debian package
        run: make build-deb VERSION=${{ steps.version.outputs.VERSION }}

      - name: Upload to Forgejo Debian registry
        run: |
          DEB_FILE=$(ls dist/*.deb | head -1)
          curl --fail -X PUT \
            -H "Authorization: token ${{ github.token }}" \
            -H "Content-Type: application/octet-stream" \
            --upload-file "${DEB_FILE}" \
            "https://${FORGEJO_HOST}/api/packages/${PACKAGE_OWNER}/debian/pool/trixie/main/upload"

