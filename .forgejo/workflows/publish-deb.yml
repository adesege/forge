
name: Publish Debian Package

on:
  push:
    tags: ["v*"]

env:
  FORGEJO_HOST: git.app.home.southroute.com
  PACKAGE_OWNER: southroute

jobs:
  publish-deb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        run: uv python install

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends dpkg-dev fakeroot lintian

      - name: Install project dependencies
        run: uv sync --all-extras

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Debian package
        run: make build-deb VERSION=${{ steps.version.outputs.VERSION }}

      - name: Upload to Forgejo Debian registry
        run: |
          DEB_FILE=$(ls dist/*.deb | head -1)
          curl --fail -X PUT \
            -H "Authorization: token ${{ secrets.PUBLISH_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --upload-file "${DEB_FILE}" \
            "https://${FORGEJO_HOST}/api/packages/${PACKAGE_OWNER}/debian/pool/trixie/main/upload"

